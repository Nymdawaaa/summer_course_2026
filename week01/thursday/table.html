<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HTML Table</title>
</head>

<body>
    <table border="5">
        <thead>
            <tr>
                <th>name</th>
                <th>age</th>
            </tr>
        </thead>
        <tbody>
            <tr>
                <td>Ijilmurun</td>
                <td>14</td>
            </tr>
            <tr>
                <td>Haliun</td>
                <td>17</td>
            </tr>
        </tbody>
    </table>
    <h1>HTML Table colspan, Rowspan</h1>
    <table border="2">
        <thead>

            <tr>
                <th>Name</th>
                <th colspan="2">Activity</th>
            </tr>
            <thead>
            <tbody>
                <tr>
                    <td>Khangaihuu</td>
                    <td>Karate</td>
                    <td>15 years</td>
                </tr>
                <tr>
                    <td>Hatoru</td>
                    <td>Discord Bot Development</td>
                    <td>2 years</td>
                </tr>

            </tbody>
    </table>
</body>

</html>
