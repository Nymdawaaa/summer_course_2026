<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <h1>Fruits and Vegetables</h1>
    <table border="1">
        <thead>
            <tr>
                <th colspan="2">Veggies</th>
                <th colspan="3">Fruits</th>
            </tr>
        </thead>
        <tbody>
            <tr>
                <td colspan="2">yellow pepper</td>
                <td rowspan="2">banana</td>
                <td rowspan="2">orange</td>
                <td rowspan="3">yellow</td>
            </tr>
            <tr>
                <td colspan="2">yello zucchini</td>
            </tr>
            <tr>
                <td>pumpkin</td>
                <td>corn</td>
                <td colspan="2">pineapple</td>
            </tr>
            <tr>
                <td colspan="2">red pepper</td>
                <td rowspan="2">strawberry</td>
                <td rowspan="2">watermelon</td>
                <td rowspan="3">red</td>

            </tr>
            <tr>
                <td>beet</td>
                <td>tomato</td>
            </tr>
            <tr>
                <td colspan="2">Radishes</td>
                <td colspan="2">cherries</td>
            </tr>


        </tbody>
    </table>

    
</body>
</html>
