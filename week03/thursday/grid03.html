<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
.box{
    background-color: #4a90e2;
    color: white;
    padding: 20px;
    text-align: center;
}
.grid-equal {
    display: grid;
    grid-template-columns: 1fr 1fr 1fr;
    grid-template-rows: 1fr 1fr;
    gap: 15px;
    height: 400px;
}
    </style>
    <link rel="stylesheet" href="./css/grids.css">
</head>

<body>
    <div class="grid-equal">
        <div class="box">1</div>
        <div class="box">2</div>
        <div class="box">3</div>
        <div class="box">4</div>
        <div class="box">5</div>
        <div class="box">6</div>
    </div>
    <h1>next grid</h1>
    <div class="grid-ratio">
        <div class="box">hajuugiin medeelel</div>
        <div class="box">gol content</div>
         <div class="box">surtachilgaa</div>
    </div>
    <h1>next grid</h1>
    <div class="grid-mixed">
     <header class="header">Tolgoi heseg (Togtmol undurtei)</header>
     <aside class="sidebar">Sidebar (Togtmol undurtei)</aside>
     <main>Undsen heseg (Uldsen buh zaig ezelne) </main>
    </div>
</body>

</html>
